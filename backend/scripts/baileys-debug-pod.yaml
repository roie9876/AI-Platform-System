apiVersion: v1
kind: Pod
metadata:
  name: baileys-debug
  namespace: tenant-eng
spec:
  restartPolicy: Never
  containers:
  - name: debug
    image: stumsftaiplatformprodacr.azurecr.io/openclaw-patched:latest
    command: ["sleep", "300"]
    volumeMounts:
    - name: data
      mountPath: /home/openclaw/.openclaw
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: oc-openclaw-agent-7dc6ac5a-data
