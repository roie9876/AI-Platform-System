name: Deploy to AKS

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  id-token: write
  contents: read

# Required secrets (in addition to OIDC secrets):
#   AKS_CLUSTER_NAME    — AKS cluster name
#   AKS_RESOURCE_GROUP  — Resource group containing AKS
#   ACR_LOGIN_SERVER    — ACR login server URL

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to AKS
        run: |
          IMAGE_TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
          ACR="${{ secrets.ACR_LOGIN_SERVER }}"

          cd k8s/base
          kustomize edit set image \
            stumsftaiplatformprodacr.azurecr.io/aiplatform-api-gateway=${ACR}/aiplatform-api-gateway:${IMAGE_TAG} \
            stumsftaiplatformprodacr.azurecr.io/aiplatform-agent-executor=${ACR}/aiplatform-agent-executor:${IMAGE_TAG} \
            stumsftaiplatformprodacr.azurecr.io/aiplatform-workflow-engine=${ACR}/aiplatform-workflow-engine:${IMAGE_TAG} \
            stumsftaiplatformprodacr.azurecr.io/aiplatform-tool-executor=${ACR}/aiplatform-tool-executor:${IMAGE_TAG} \
            stumsftaiplatformprodacr.azurecr.io/aiplatform-mcp-proxy=${ACR}/aiplatform-mcp-proxy:${IMAGE_TAG}
          kubectl apply -k .

      - name: Wait for rollouts
        run: |
          for SVC in api-gateway agent-executor workflow-engine tool-executor mcp-proxy; do
            echo "Waiting for ${SVC} rollout..."
            kubectl rollout status deployment/${SVC} --timeout=300s
          done

      - name: Run smoke tests
        run: |
          bash k8s/scripts/smoke-test.sh default

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

      - name: Deploy frontend
        run: |
          IMAGE_TAG="${{ needs.deploy-backend.outputs.image_tag || 'latest' }}"
          ACR="${{ secrets.ACR_LOGIN_SERVER }}"

          kubectl apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: frontend
            labels:
              app: frontend
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: frontend
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxUnavailable: 0
                maxSurge: 1
            template:
              metadata:
                labels:
                  app: frontend
              spec:
                containers:
                  - name: frontend
                    image: ${ACR}/aiplatform-frontend:${IMAGE_TAG}
                    ports:
                      - containerPort: 3000
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
                    livenessProbe:
                      httpGet:
                        path: /
                        port: 3000
                      initialDelaySeconds: 10
                      periodSeconds: 30
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 3000
                      initialDelaySeconds: 5
                      periodSeconds: 10
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: frontend
          spec:
            selector:
              app: frontend
            ports:
              - port: 3000
                targetPort: 3000
          EOF

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/frontend --timeout=300s
