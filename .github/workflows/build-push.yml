name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-push.yml"

permissions:
  id-token: write
  contents: read

# Required secrets:
#   AZURE_CLIENT_ID      — Entra ID app registration for GitHub Actions OIDC
#   AZURE_TENANT_ID      — Entra tenant ID
#   AZURE_SUBSCRIPTION_ID — Azure subscription ID
#   ACR_LOGIN_SERVER     — e.g. stumsftaiplatformprodacr.azurecr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - agent-executor
          - workflow-engine
          - tool-executor
          - mcp-proxy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/aiplatform-${{ matrix.service }}"
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            -f backend/microservices/${{ matrix.service }}/Dockerfile \
            backend/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and push frontend
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/aiplatform-frontend"
          docker build \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            -f frontend/Dockerfile \
            frontend/
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
