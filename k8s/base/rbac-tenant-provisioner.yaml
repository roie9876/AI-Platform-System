apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiplatform-tenant-provisioner
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "delete"]
  # Core resources in tenant namespaces
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges", "services", "serviceaccounts"]
    verbs: ["create", "get", "list", "update"]
  # Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "update"]
  # NetworkPolicies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list"]
  # HPA
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["create", "get", "list", "update"]
  # Secrets (for OpenClaw env vars)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "update", "delete"]
  # CSI SecretProviderClass (Key Vault integration)
  - apiGroups: ["secrets-store.csi.x-k8s.io"]
    resources: ["secretproviderclasses"]
    verbs: ["create", "get", "list", "update", "delete"]
  # OpenClaw instances
  - apiGroups: ["openclaw.rocks"]
    resources: ["openclawinstances"]
    verbs: ["create", "get", "list", "update", "delete", "patch"]
  # Pod status checks (agent readiness)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Pod exec (device approval, group discovery)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  # KEDA autoscaling (TriggerAuthentication + ScaledObject)
  - apiGroups: ["keda.sh"]
    resources: ["triggerauthentications", "scaledobjects"]
    verbs: ["create", "get", "list", "update", "delete"]
  # PVC cleanup on agent/tenant deletion
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiplatform-tenant-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aiplatform-tenant-provisioner
subjects:
  - kind: ServiceAccount
    name: aiplatform-workload
    namespace: aiplatform
