apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aiplatform-keyvault
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${WORKLOAD_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: cosmos-endpoint
          objectType: secret
        - |
          objectName: entra-client-id
          objectType: secret
        - |
          objectName: entra-tenant-id
          objectType: secret
        - |
          objectName: workload-client-id
          objectType: secret
        - |
          objectName: service-bus-namespace
          objectType: secret
        - |
          objectName: appinsights-connection-string
          objectType: secret
        - |
          objectName: platform-admin-emails
          objectType: secret
        - |
          objectName: entra-admin-group-id
          objectType: secret
        - |
          objectName: entra-client-secret
          objectType: secret
        - |
          objectName: jira
          objectType: secret
        - |
          objectName: azure-openai-endpoint
          objectType: secret
        - |
          objectName: azure-openai-key
          objectType: secret
        - |
          objectName: secret-key
          objectType: secret
        - |
          objectName: encryption-key
          objectType: secret
        - |
          objectName: github-token
          objectType: secret
        - |
          objectName: sharepoint-tenant-id
          objectType: secret
        - |
          objectName: sharepoint-client-id
          objectType: secret
        - |
          objectName: sharepoint-client-secret
          objectType: secret
        - |
          objectName: sharepoint-site-hostname
          objectType: secret
        - |
          objectName: cookie-secret
          objectType: secret
  secretObjects:
    - secretName: aiplatform-secrets
      type: Opaque
      data:
        - objectName: cosmos-endpoint
          key: COSMOS_ENDPOINT
        - objectName: jira
          key: JIRA_API_TOKEN
        - objectName: entra-client-id
          key: AZURE_CLIENT_ID
        - objectName: entra-tenant-id
          key: AZURE_TENANT_ID
        - objectName: workload-client-id
          key: AZURE_WORKLOAD_CLIENT_ID
        - objectName: service-bus-namespace
          key: SERVICE_BUS_NAMESPACE
        - objectName: appinsights-connection-string
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
        - objectName: platform-admin-emails
          key: PLATFORM_ADMIN_EMAILS
        - objectName: entra-admin-group-id
          key: ENTRA_ADMIN_GROUP_ID
        - objectName: entra-client-secret
          key: ENTRA_CLIENT_SECRET
        - objectName: azure-openai-endpoint
          key: AZURE_OPENAI_ENDPOINT
        - objectName: azure-openai-key
          key: AZURE_OPENAI_KEY
        - objectName: secret-key
          key: SECRET_KEY
        - objectName: encryption-key
          key: ENCRYPTION_KEY
        - objectName: github-token
          key: GITHUB_TOKEN
        - objectName: sharepoint-tenant-id
          key: SHAREPOINT_TENANT_ID
        - objectName: sharepoint-client-id
          key: SHAREPOINT_CLIENT_ID
        - objectName: sharepoint-client-secret
          key: SHAREPOINT_CLIENT_SECRET
        - objectName: sharepoint-site-hostname
          key: SHAREPOINT_SITE_HOSTNAME
        - objectName: cookie-secret
          key: COOKIE_SECRET
