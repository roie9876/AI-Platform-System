apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiplatform-ingress
  annotations:
    alb.networking.azure.io/alb-id: "${AGC_RESOURCE_ID}"
spec:
  ingressClassName: azure-alb-external
  tls:
    - secretName: agc-tls-secret
  rules:
    - http:
        paths:
          # Threads — agent-executor
          - path: /api/v1/threads
            pathType: Prefix
            backend:
              service:
                name: agent-executor
                port:
                  number: 8000
          # Workflows
          - path: /api/v1/workflows
            pathType: Prefix
            backend:
              service:
                name: workflow-engine
                port:
                  number: 8000
          # Tools and data sources
          - path: /api/v1/tools
            pathType: Prefix
            backend:
              service:
                name: tool-executor
                port:
                  number: 8000
          - path: /api/v1/data-sources
            pathType: Prefix
            backend:
              service:
                name: tool-executor
                port:
                  number: 8000
          - path: /api/v1/knowledge
            pathType: Prefix
            backend:
              service:
                name: tool-executor
                port:
                  number: 8000
          # MCP
          - path: /api/v1/mcp-servers
            pathType: Prefix
            backend:
              service:
                name: mcp-proxy
                port:
                  number: 8000
          - path: /api/v1/mcp
            pathType: Prefix
            backend:
              service:
                name: mcp-proxy
                port:
                  number: 8000
          # API Gateway — catch-all for /api/v1 (agents CRUD + chat + everything else)
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          # Auth Gateway — OpenClaw native UI proxy (path-based mode)
          - path: /agents
            pathType: Prefix
            backend:
              service:
                name: auth-gateway
                port:
                  number: 8000
          # Frontend — catch-all for everything else (pages, static assets)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
