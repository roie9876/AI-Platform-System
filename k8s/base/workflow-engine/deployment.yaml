apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-engine
  labels:
    app: workflow-engine
    app.kubernetes.io/name: workflow-engine
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: workflow-engine
      app.kubernetes.io/part-of: aiplatform
  template:
    metadata:
      labels:
        app: workflow-engine
        app.kubernetes.io/name: workflow-engine
        app.kubernetes.io/part-of: aiplatform
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: aiplatform-workload
      containers:
        - name: workflow-engine
          image: ${ACR_SERVER}/aiplatform-workflow-engine:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aiplatform-config
          env:
            - name: SERVICE_NAME
              value: "workflow-engine"
            - name: COSMOS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: COSMOS_ENDPOINT
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_CLIENT_ID
            - name: ENTRA_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_CLIENT_ID
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_TENANT_ID
            - name: AZURE_WORKLOAD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_WORKLOAD_CLIENT_ID
            - name: SERVICE_BUS_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: SERVICE_BUS_NAMESPACE
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: APPLICATIONINSIGHTS_CONNECTION_STRING
            - name: PLATFORM_ADMIN_EMAILS
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: PLATFORM_ADMIN_EMAILS
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: SECRET_KEY
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: ENCRYPTION_KEY
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /startupz
              port: 8000
            initialDelaySeconds: 3
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "aiplatform-keyvault"
