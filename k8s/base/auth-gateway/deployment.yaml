apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-gateway
  labels:
    app: auth-gateway
    app.kubernetes.io/name: auth-gateway
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: auth-gateway
  template:
    metadata:
      labels:
        app: auth-gateway
        app.kubernetes.io/name: auth-gateway
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: aiplatform-workload
      containers:
        - name: auth-gateway
          image: ${ACR_SERVER}/aiplatform-auth-gateway:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aiplatform-config
          env:
            - name: SERVICE_NAME
              value: "auth-gateway"
            - name: COSMOS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: COSMOS_ENDPOINT
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_CLIENT_ID
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_TENANT_ID
            - name: AZURE_WORKLOAD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_WORKLOAD_CLIENT_ID
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: APPLICATIONINSIGHTS_CONNECTION_STRING
            - name: ENTRA_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: ENTRA_APP_CLIENT_ID
                  optional: true
            - name: ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: ENTRA_CLIENT_SECRET
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /startupz
              port: 8000
            initialDelaySeconds: 3
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: aiplatform-keyvault
