apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/name: api-gateway
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: aiplatform-workload
      containers:
        - name: api-gateway
          image: stumsftaiplatformprodacr.azurecr.io/aiplatform-api-gateway:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aiplatform-config
          env:
            - name: SERVICE_NAME
              value: "api-gateway"
            - name: COSMOS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: COSMOS_ENDPOINT
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_CLIENT_ID
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_TENANT_ID
            - name: AZURE_WORKLOAD_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aiplatform-secrets
                  key: AZURE_WORKLOAD_CLIENT_ID
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /startupz
              port: 8000
            initialDelaySeconds: 3
            failureThreshold: 30
            periodSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
