# Health check policies for Application Gateway for Containers
# AGC defaults to probing "/" — these override for services that don't serve "/"
---
apiVersion: alb.networking.azure.io/v1
kind: HealthCheckPolicy
metadata:
  name: api-gateway-health-check
  namespace: aiplatform
spec:
  targetRef:
    group: ""
    kind: Service
    name: api-gateway
  default:
    interval: 15s
    timeout: 10s
    healthyThreshold: 1
    unhealthyThreshold: 3
    port: 8000
    http:
      path: /healthz
      match:
        statusCodes:
          - start: 200
            end: 299
