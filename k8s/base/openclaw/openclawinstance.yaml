apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: aiplatform-agent
  namespace: aiplatform
spec:
  # Pull secrets (Telegram token, AI provider keys, Gmail app password) from K8s Secret
  envFrom:
    - secretRef:
        name: openclaw-api-keys

  # Persistent storage for agent state, memory, and workspace
  storage:
    persistence:
      enabled: true
      size: 10Gi

  # Install Himalaya email skill
  skills:
    - "himalaya"

  # Runtime deps for skills
  runtimeDeps:
    pnpm: true

  # Seed agent instructions and email bootstrap for Gmail access
  # Replace ${GMAIL_ADDRESS} with the actual Gmail address during deployment
  workspace:
    initialFiles:
      CLAUDE.md: |
        # Agent Instructions

        ## CRITICAL: First-Run Setup
        On your very first task, BEFORE doing anything else, run this command to configure email:
        ```sh
        mkdir -p ~/.config/himalaya && cat > ~/.config/himalaya/config.toml << HIMALAYA_EOF
        [accounts.gmail]
        email = "${GMAIL_ADDRESS}"
        display-name = "${GMAIL_ADDRESS}"
        default = true

        backend.type = "imap"
        backend.host = "imap.gmail.com"
        backend.port = 993
        backend.encryption.type = "tls"
        backend.login = "${GMAIL_ADDRESS}"
        backend.auth.type = "password"
        backend.auth.cmd = "printenv GMAIL_APP_PASSWORD"

        message.send.backend.type = "smtp"
        message.send.backend.host = "smtp.gmail.com"
        message.send.backend.port = 587
        message.send.backend.encryption.type = "start-tls"
        message.send.backend.login = "${GMAIL_ADDRESS}"
        message.send.backend.auth.type = "password"
        message.send.backend.auth.cmd = "printenv GMAIL_APP_PASSWORD"
        HIMALAYA_EOF
        ```
        Only run this once. If `~/.config/himalaya/config.toml` already exists, skip this step.

        ## Email Access
        You have access to the Gmail account ${GMAIL_ADDRESS} via the Himalaya CLI.
        ALWAYS use the `himalaya` command-line tool for any email operations — NEVER open Gmail in a browser.

        Common commands:
        - List unread emails: `himalaya envelope list --folder INBOX --query "unseen"`
        - Read an email: `himalaya message read <id>`
        - Send an email: `himalaya message write --to "<address>" --subject "<subject>" --body "<body>"`
        - Reply to an email: `himalaya message reply <id>`
        - Search emails: `himalaya envelope list --folder INBOX --query "<query>"`
        - List folders: `himalaya folder list`

        When asked about email, unread messages, or Gmail, use Himalaya immediately — do not browse to gmail.com.

  # Chromium sidecar for web scraping and deep research
  chromium:
    enabled: true
    persistence:
      enabled: true
      size: 1Gi

  # Agent configuration
  config:
    raw:
      # Telegram channel config
      channels:
        telegram:
          enabled: true
          dmPolicy: "allowlist"
          allowFrom:
            - "1650447692"

      # Azure OpenAI via azure-openai-responses provider
      # Ref: https://techcommunity.microsoft.com/blog/educatordeveloperblog/integrating-microsoft-foundry-with-openclaw-step-by-step-model-configuration/4495586
      models:
        providers:
          azure-openai-responses:
            baseUrl: "https://ai-platform-system.openai.azure.com/openai/v1"
            apiKey: "${AZURE_API_KEY}"
            api: "openai-responses"
            authHeader: false
            headers:
              api-key: "${AZURE_API_KEY}"
            models:
              - id: "gpt-5.4"
                name: "GPT-5.4 (Azure)"
                reasoning: true
                input: ["text", "image"]
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
                contextWindow: 400000
                maxTokens: 16384
                compat: { supportsStore: false }
              - id: "gpt-4.1"
                name: "GPT-4.1 (Azure)"
                reasoning: false
                input: ["text", "image"]
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
                contextWindow: 1047576
                maxTokens: 32768
                compat: { supportsStore: false }

      # Agent defaults — use Azure-hosted model
      agents:
        defaults:
          model:
            primary: "azure-openai-responses/gpt-4.1"
            research: "azure-openai-responses/gpt-5.4"

      # Session scope per sender (each Telegram user gets own session)
      session:
        scope: "per-sender"
